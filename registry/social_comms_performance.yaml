# Dashboard Registry — Social Comms Performance
# Generated by /onboard-dashboard skill on 2026-07-01
# REVIEW ALL FIELDS MARKED WITH # VERIFY before committing.
#
# Owners (from dashboard Glossary page):
#   Dashboard: Sam Atayan, Yamini Pancheti
#   Data Steward: Raghuram Gopalakrishnan, Nagaraju Gajula
# Refresh cadence: Tuesdays 10:30 AM PST.

dashboard: social_comms_performance
description: >
  Weekly Adobe social media performance dashboard covering Paid, Organic, Earned,
  and Influencer channels across platforms and GTM segments (Overview, Content
  Framework Pillar - Paid/Organic, Deep-dive views).

dashboard_table: socialmedia.social_hub_consolidated_dashboard
source_table:    socialmedia.social_media_consolidated_silver
date_column:     fiscal_yr_and_wk_desc
date_format:     "YYYY-WW"

# NOTE: dashboard_table and source_table are both shared with the
# social_hub_consolidated_dashboard pilot — this Power BI report is a
# different presentation layer over the same underlying Databricks tables.
# checks.py hardcodes a "(data_type != 'Budget' OR data_type IS NULL)" filter on
# every query against both tables — this already excludes Budget rows without
# any row_filter entry needed here.

# Ratio/derived metrics seen on the dashboard (EIR, CPM, CPI, CPE, $/100I) are
# computed from other columns, not stored raw sums — intentionally excluded from
# reconciliation/parts_sum below since they can't be validated by SUM comparison.

metrics:

  - name: spend
    tolerance_pct: 0.5
    checks: [reconciliation, trend_sanity]

  - name: interactions
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]

  - name: impressions
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]

  - name: engagements
    tolerance_pct: 1.5
    checks: [reconciliation, trend_sanity]

  - name: video_views
    tolerance_pct: 2.0
    checks: [reconciliation, trend_sanity]

  - name: link_clicks
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: clicks_all
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: comments
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: likes
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: shares
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: saves
    tolerance_pct: 1.5
    checks: [reconciliation]

dimensions:

  # VERIFY: column name assumed as `platform` — confirm in source table.
  # Instagram Stories, Instagram Reels, Snapchat, and "NA" were seen with very
  # small/inconsistent shares in the PDF, so they're left out of expected_values
  # to avoid false DRIFT/FAIL on weeks they don't appear.
  - name: platform
    completeness_check: true
    expected_values:
      - TikTok
      - Meta
      - Instagram
      - YouTube
      - Facebook
      - Twitter
      - LinkedIn
      - Pinterest

  # VERIFY: column name assumed as `media_type` — could also be `data_type`
  # (shared source table uses `data_type` for the pilot dashboard's 4-value
  # version of this same concept). Completeness disabled per user confirmation:
  # source systems have migrated over time (Golin XLS -> CreatorIQ/Sprinklr API),
  # and "Influencer (organic only)" dropped to zero posts from week 2026-26
  # onward, which would cause permanent false-positive completeness failures.
  - name: media_type
    completeness_check: false
    expected_values:
      - Earned
      - Organic
      - Influencer (organic + boosting)
      - Influencer (organic only)
      - Paid - Boosted Owned
      - Paid - Boosted Whitelisted
      - Paid - Dark Owned
      - Paid - Dark Whitelisted

  # VERIFY: column name assumed as `gtm_segment`. Completeness disabled per user
  # confirmation: the visible segment list differs sharply between the Paid pillar
  # (~12 values) and Organic pillar (~19 values), so no single "always present"
  # list can be established from the PDF alone.
  - name: gtm_segment
    completeness_check: false
    expected_values: []

  # VERIFY: column name assumed as `cloud_budget`. Completeness disabled: the
  # Overview page shows 7 values (CC, Brand, DC, Cross-Cloud, NA, Standard
  # Sponsorship, EC) while the pillar detail pages show only 4 (CC, Brand, DC, EC).
  - name: cloud_budget
    completeness_check: false
    expected_values: []

checks:

  freshness:
    enabled: true

  reconciliation:
    enabled: true

  parts_sum:
    enabled: true
    pivot_column: gtm_segment

  trend_sanity:
    enabled: true
    max_wow_change_pct: 100.0
    # Set higher than the pilot's 50.0: the PDF itself shows a legitimate 104%
    # WoW jump on the Organic pillar page, so swings of this size are normal
    # for this dashboard, not a data quality issue.

  completeness:
    enabled: true
