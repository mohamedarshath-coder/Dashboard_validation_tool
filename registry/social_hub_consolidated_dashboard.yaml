# Dashboard Registry — Social Hub Consolidated Dashboard
# -----------------------------------------------------------
# Human-approved spec. Claude drafts it once; you lock it here.
# The weekly Databricks job reads this file — no AI in the verdict.
# To add/remove a check, edit this file and commit. The job picks
# it up on the next run.
# -----------------------------------------------------------

dashboard: social_hub_consolidated_dashboard
description: >
  Social Hub consolidated dashboard covering Paid, Organic, Earned, and Influencer
  channels for Adobe Creative Cloud social media performance.

dashboard_table: socialmedia.social_hub_consolidated_dashboard
source_tables:
  - socialmedia.social_media_consolidated_silver

date_column:  fiscal_yr_and_wk_desc
date_format:  "YYYY-WW"
row_filter:   "data_type != 'Budget' OR data_type IS NULL"

# ── Metrics ───────────────────────────────────────────────────────────────────
# tolerance      : max acceptable gap between dashboard and source (use % suffix)
# dimensions     : which dimension columns to use for parts_sum and completeness
# checks         : freshness | reconciliation | parts_sum | trend | completeness
# ─────────────────────────────────────────────────────────────────────────────

metrics:

  - name: impressions
    tolerance: 1.0%
    dimensions: [platform, data_type]
    checks: [reconciliation, parts_sum, trend, completeness]

  - name: engagements
    tolerance: 1.0%
    dimensions: [platform, data_type]
    checks: [reconciliation, parts_sum, trend, completeness]

  - name: spend
    tolerance: 1.0%
    dimensions: [platform]
    checks: [reconciliation, parts_sum, trend]

  - name: video_views
    tolerance: 2.0%
    dimensions: [platform]
    checks: [reconciliation, parts_sum, trend]

  - name: clicks_all
    tolerance: 1.5%
    dimensions: [platform]
    checks: [reconciliation, parts_sum]

  - name: likes
    tolerance: 2.0%
    dimensions: [platform]
    checks: [reconciliation, parts_sum]

# ── Dimensions ────────────────────────────────────────────────────────────────
# expected_values  : full set of values the dashboard must have each week.
#                    Referenced by metrics[].dimensions above.
# ─────────────────────────────────────────────────────────────────────────────

dimensions:

  - name: platform
    expected_values:
      - LinkedIn
      - Instagram
      - Facebook
      - YouTube
      - TikTok
      - Twitter
      - Pinterest
      - Threads

  - name: data_type
    expected_values:
      - Paid
      - Organic
      - Earned
      - Influencer

# ── Check Configuration ───────────────────────────────────────────────────────
# Global switches — each check type still needs enabled: true here.
# Per-metric dimensions + checks list above control what actually runs.
# ─────────────────────────────────────────────────────────────────────────────

checks:

  freshness:
    enabled: true

  reconciliation:
    enabled: true

  parts_sum:
    enabled: true

  trend_sanity:
    enabled: true
    max_wow_change_pct: 50.0

  completeness:
    enabled: true
