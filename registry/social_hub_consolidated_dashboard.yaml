# Dashboard Registry — Social Hub Consolidated Dashboard
# -----------------------------------------------------------
# Human-approved spec. Claude drafts it once; you lock it here.
# The weekly Databricks job reads this file — no AI in the verdict.
# To add/remove a check, edit this file and commit. The job picks
# it up on the next run.
# -----------------------------------------------------------

dashboard: social_hub_consolidated_dashboard
description: >
  Social Hub consolidated dashboard covering Paid, Organic, Earned, and Influencer
  channels for Adobe Creative Cloud social media performance.

dashboard_table: socialmedia.social_hub_consolidated_dashboard
source_table:    socialmedia.social_media_consolidated_silver
date_column:     fiscal_yr_and_wk_desc
date_format:     "YYYY-WW"
row_filter:      "data_type != 'Budget' OR data_type IS NULL"

# ── Metrics ─────────────────────────────────────────────────────────────────
# tolerance_pct : max acceptable gap between dashboard value and source value.
# checks        : which check types to run for this metric.
#   reconciliation — dashboard total ≈ source total
#   trend_sanity   — week-over-week change within bounds
# ─────────────────────────────────────────────────────────────────────────────
metrics:

  - name: impressions
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]

  - name: engagements
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]

  - name: spend
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]

  - name: video_views
    tolerance_pct: 2.0
    checks: [reconciliation, trend_sanity]

  - name: clicks_all
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: likes
    tolerance_pct: 2.0
    checks: [reconciliation]

# ── Dimensions ──────────────────────────────────────────────────────────────
# completeness_check : verify all expected_values appear each week.
# expected_values    : the full set of dimension values the dashboard must have.
#                      Missing values → DRIFT (1 missing) or FAIL (2+).
# ─────────────────────────────────────────────────────────────────────────────
dimensions:

  - name: platform
    completeness_check: true
    expected_values:
      - LinkedIn
      - Instagram
      - Facebook
      - YouTube
      - TikTok
      - Twitter
      - Pinterest
      - Threads

  - name: data_type
    completeness_check: true
    expected_values:
      - Paid
      - Organic
      - Earned
      - Influencer

# ── Check Configuration ─────────────────────────────────────────────────────
checks:

  freshness:
    enabled: true
    # Fail if MAX(date_column) in dashboard != run_week

  reconciliation:
    enabled: true
    # Dashboard SUM(metric) ≈ source SUM(metric) within tolerance_pct

  parts_sum:
    enabled: true
    pivot_column: platform
    # Each platform's dashboard subtotal ≈ source subtotal within metric tolerance

  trend_sanity:
    enabled: true
    max_wow_change_pct: 50.0
    # |week-over-week change| <= max_wow_change_pct → PASS
    # up to 1.5x → DRIFT, above 1.5x → FAIL

  completeness:
    enabled: true
    # Every expected dimension value must appear in the current week's data
