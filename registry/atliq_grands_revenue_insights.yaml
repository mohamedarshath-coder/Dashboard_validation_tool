# Dashboard Registry — AtliQ Grands Revenue Insights
# Generated by /onboard-dashboard skill on 2026-07-08

dashboard: atliq_grands_revenue_insights
description: >
  Weekly hospitality performance dashboard for AtliQ Grands properties,
  validating revenue and bookings against raw fact tables.

dashboard_table: dev.dashboard_val.gold_revenue_insights
source_tables:
  - dev.dashboard_val.fact_bookings
  - dev.dashboard_val.fact_aggregated_bookings

date_column:  check_in_date
date_format:  "YYYY-MM-DD"

# ── Metrics ──────────────────────────────────────────────────────────────────
# revenue_realized / revenue_generated → reconcile against fact_bookings
# total_bookings → recompute_sql against fact_aggregated_bookings
#   (source column is 'successful_bookings'; date is 'dd-MMM-yy' string → converted via TO_DATE)
# parts_sum dimensions limited to room_category / booking_platform
#   (only dims directly in fact_bookings; city/hotel_category/room_class require joins)
# ─────────────────────────────────────────────────────────────────────────────

metrics:

  - name: revenue_realized
    tolerance: 0.5%
    dimensions: [room_category, booking_platform]
    checks: [freshness, reconciliation, parts_sum, trend, completeness]

  - name: revenue_generated
    tolerance: 0.5%
    dimensions: [room_category, booking_platform]
    checks: [reconciliation, parts_sum, trend]

  - name: total_bookings
    tolerance: 0.5%
    recompute_sql: >
      SELECT SUM(successful_bookings)
      FROM dev.dashboard_val.fact_aggregated_bookings
      WHERE TO_DATE(check_in_date, 'dd-MMM-yy') = TO_DATE('{run_week}', 'yyyy-MM-dd')
    checks: [reconciliation, trend]

# ── Dimensions ────────────────────────────────────────────────────────────────
dimensions:

  - name: room_category
    expected_values:
      - RT1
      - RT2
      - RT3
      - RT4

  - name: booking_platform
    expected_values:
      - direct offline
      - direct online
      - journey
      - logtrip
      - makeyourtrip
      - others
      - tripster

# ── Check Configuration ───────────────────────────────────────────────────────
checks:

  freshness:
    enabled: true

  reconciliation:
    enabled: true

  parts_sum:
    enabled: true

  trend_sanity:
    enabled: true
    max_wow_change_pct: 50.0

  completeness:
    enabled: true
