# Dashboard Registry — AtliQ Grands Revenue Insights
# Generated by /onboard-dashboard skill on 2026-07-01
# REVIEW ALL FIELDS MARKED WITH # VERIFY before committing.
# -----------------------------------------------------------
# Human-approved spec. Claude drafts it once; you lock it here.
# The weekly Databricks job reads this file — no AI in the verdict.
# -----------------------------------------------------------

dashboard: atliq_grands_revenue_insights
description: >
  AtliQ Grands hotel chain revenue and performance dashboard covering
  revenue, occupancy, ADR, RevPAR, DSRN, and booking metrics across
  properties, cities, room categories, and booking platforms.
  Weekly granularity — May to July 2022.

dashboard_table: dev.dashboard_val.fact_bookings
source_table:    dev.dashboard_val.fact_aggregated_bookings
date_column:     check_in_date
date_format:     "YYYY-MM-DD"
# NOTE: check_in_date is DATE in fact_bookings but STRING in fact_aggregated_bookings
# Use CAST(check_in_date AS DATE) when querying fact_aggregated_bookings

# ── Metrics ──────────────────────────────────────────────────────────────────
# tolerance_pct : max acceptable gap between recomputed value and baseline.
# checks        : which check types to run for this metric.
# ─────────────────────────────────────────────────────────────────────────────

metrics:

  - name: revenue_realized
    tolerance_pct: 0.5
    checks: [freshness, reconciliation, trend_sanity]
    # Currency metric — tight tolerance. SUM(revenue_realized) from fact_bookings.

  - name: total_bookings
    tolerance_pct: 1.0
    checks: [freshness, reconciliation, trend_sanity]
    # COUNT of Checked Out bookings. VERIFY: booking_status = 'Checked Out'

  - name: occupancy_pct
    tolerance_pct: 3.0
    checks: [reconciliation, trend_sanity]
    # VERIFY: SUM(successful_bookings)/SUM(capacity) from fact_aggregated_bookings
    # Percentage metric — wider tolerance acceptable.

  - name: adr
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]
    # VERIFY: SUM(revenue_realized)/SUM(successful_bookings) — Average Daily Rate

  - name: revpar
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]
    # VERIFY: SUM(revenue_realized)/SUM(capacity) — Revenue Per Available Room

  - name: realisation_pct
    tolerance_pct: 3.0
    checks: [reconciliation, trend_sanity]
    # VERIFY: SUM(revenue_realized)/SUM(revenue_generated) from fact_bookings

  - name: dsrn
    tolerance_pct: 1.0
    checks: [freshness, reconciliation]
    # VERIFY: Daily Sellable Room Nights = SUM(capacity) from fact_aggregated_bookings

  - name: cancellation_pct
    tolerance_pct: 3.0
    checks: [reconciliation]
    # VERIFY: COUNT(booking_status='Cancelled')/COUNT(*) from fact_bookings

  - name: average_rating
    tolerance_pct: 2.0
    checks: [reconciliation]
    # AVG(ratings_given) from fact_bookings

# ── Dimensions ───────────────────────────────────────────────────────────────
# completeness_check : verify all expected_values appear each week.
# expected_values    : full set of dimension values the dashboard must have.
# ─────────────────────────────────────────────────────────────────────────────

dimensions:

  - name: city
    completeness_check: true
    expected_values:
      - Bangalore
      - Mumbai
      - Delhi
      - Hyderabad
    # VERIFY: confirm this is the complete list from dim_hotels

  - name: booking_platform
    completeness_check: true
    expected_values:
      - logtrip
      - journey
      - direct online
      - direct offline
      - others
      - makeyourtrip
      - tripster
    # 7 platforms visible in Realisation % and ADR by booking_platform chart

  - name: room_category
    completeness_check: true
    expected_values:
      - RT1
      - RT2
      - RT3
      - RT4
    # VERIFY: RT1-RT4 map to Luxury/Business shown in % Revenue by category chart

# ── Check Configuration ──────────────────────────────────────────────────────

checks:

  freshness:
    enabled: true
    # FAIL if MAX(check_in_date) in dashboard != run date

  reconciliation:
    enabled: true
    # Recomputed metric value ≈ baseline within tolerance_pct

  parts_sum:
    enabled: true
    pivot_column: room_category
    # CHANGED: city is in dim_hotels not in fact tables — using room_category instead
    # room_category exists in both fact_bookings and fact_aggregated_bookings

  trend_sanity:
    enabled: true
    max_wow_change_pct: 50.0
    # Dashboard shows W19-W31 trend — normal week-over-week expected within 50%

  completeness:
    enabled: true
    # All 4 cities, 7 platforms, 4 room categories must appear each week
