# Dashboard Registry — AtliQ Grands Revenue Insights
# Generated by /onboard-dashboard skill on 2026-07-01
# -----------------------------------------------------------
# Human-approved spec. Claude drafts it once; you lock it here.
# The weekly Databricks job reads this file — no AI in the verdict.
# -----------------------------------------------------------

dashboard: atliq_grands_revenue_insights
description: >
  AtliQ Grands hotel chain revenue and performance dashboard covering
  revenue, occupancy, ADR, RevPAR, DSRN, and booking metrics across
  properties, cities, room categories, and booking platforms.
  Daily granularity — May to July 2022.

dashboard_table: dev.dashboard_val.fact_bookings
source_table:    dev.dashboard_val.fact_bookings
date_column:     check_in_date
date_format:     "YYYY-MM-DD"

# NOTE: source_table = dashboard_table here because AtliQ Grands has no
# separate dashboard layer — both point to fact_bookings. In production,
# source_table would be the upstream silver/gold table feeding the BI layer.

# ── Metrics ──────────────────────────────────────────────────────────────────
# Only columns that physically exist in fact_bookings as SUM-able values.
# Derived KPIs (occupancy_pct, ADR, RevPAR) are computed by the BI tool from
# these raw columns — they are not stored as separate columns.
# ─────────────────────────────────────────────────────────────────────────────

metrics:

  - name: revenue_realized
    tolerance_pct: 0.5
    checks: [freshness, reconciliation, trend_sanity]

  - name: revenue_generated
    tolerance_pct: 0.5
    checks: [reconciliation, trend_sanity]

  - name: ratings_given
    tolerance_pct: 2.0
    checks: [reconciliation]

# ── Dimensions ───────────────────────────────────────────────────────────────

dimensions:

  - name: room_category
    completeness_check: true
    expected_values:
      - RT1
      - RT2
      - RT3
      - RT4

  - name: booking_platform
    completeness_check: true
    expected_values:
      - logtrip
      - journey
      - direct online
      - direct offline
      - others
      - makeyourtrip
      - tripster

# ── Check Configuration ──────────────────────────────────────────────────────

checks:

  freshness:
    enabled: true

  reconciliation:
    enabled: true

  parts_sum:
    enabled: true
    pivot_column: room_category

  trend_sanity:
    enabled: true
    max_wow_change_pct: 50.0

  completeness:
    enabled: true
